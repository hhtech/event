<title>倒数纪念日</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.12)}
.gate h3{font-size:18px;margin-bottom:8px;text-align:center}
.gate p{font-size:13px;color:#8e8e93;text-align:center;margin-bottom:20px}
.gate input{width:100%;border:1.5px solid #e5e5ea;border-radius:10px;padding:12px 14px;font-size:16px;background:#f2f2f7;font-family:inherit;margin-bottom:16px}
.gate input:focus{outline:none;border-color:#007aff}
.gate .btn{width:100%;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:600;background:#007aff;color:#fff;cursor:pointer;font-family:inherit}
.gate .err{color:#ff3b30;font-size:13px;margin-top:8px;text-align:center}
.gate-rm{display:flex;align-items:center;gap:12px;margin:14px 0 20px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.gate-rm input{position:absolute;opacity:0;width:0;height:0}
.gate-rm-box{flex-shrink:0;width:20px;height:20px;border:2px solid #c7c7cc;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.gate-rm input:checked+.gate-rm-box{border-color:#007aff;background:#007aff}
.gate-rm-box::after{content:'';width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px);opacity:0;transition:opacity .15s}
.gate-rm input:checked+.gate-rm-box::after{opacity:1}
.gate-rm span:last-child{font-size:14px;color:#3c3c43;line-height:1.5;flex:1;min-width:0}
</style>
</head>
